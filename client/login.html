<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangaServer — Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;}
    .card{background:#161b27;border:1px solid #30363d;border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center;}
    .logo{width:64px;height:64px;background:#F5B800;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#0d1117;margin:0 auto 16px;}
    h1{font-size:22px;font-weight:700;color:#e6edf3;margin-bottom:6px;}
    p{font-size:14px;color:#7d8590;margin-bottom:28px;}
    label{display:block;text-align:left;font-size:12px;font-weight:600;color:#7d8590;margin-bottom:5px;}
    input{width:100%;background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:13px 16px;font-size:15px;color:#e6edf3;outline:none;margin-bottom:14px;transition:border-color .2s;}
    input:focus{border-color:#F5B800;}
    input::placeholder{color:#7d8590;}
    button{width:100%;background:#F5B800;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;color:#0d1117;cursor:pointer;transition:opacity .2s;}
    button:hover{opacity:.88;}
    button:disabled{opacity:.5;cursor:not-allowed;}
    .error{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#e74c3c;margin-bottom:14px;display:none;text-align:left;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>MangaServer</h1>
    <p>Tu biblioteca personal de manga</p>
    <div class="error" id="err"></div>
    <label for="usr">Usuario</label>
    <input type="text" id="usr" placeholder="Tu nombre de usuario" autocomplete="username">
    <label for="pwd">Contraseña</label>
    <input type="password" id="pwd" placeholder="Tu contraseña" autocomplete="current-password">
    <button id="btn" onclick="login()">Entrar</button>
  </div>
  <script>
    const token = localStorage.getItem('manga_token');
    if(token){
      fetch('/api/verify',{headers:{Authorization:'Bearer '+token}})
        .then(r=>{if(r.ok)window.location.href='/';}).catch(()=>{});
    }
    ['usr','pwd'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')login();}));
    async function login(){
      const usr=document.getElementById('usr').value.trim();
      const pwd=document.getElementById('pwd').value.trim();
      const btn=document.getElementById('btn');
      const err=document.getElementById('err');
      if(!usr||!pwd)return;
      btn.disabled=true;btn.textContent='Verificando...';err.style.display='none';
      try{
        const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:usr,password:pwd})});
        const data=await res.json();
        if(res.ok){
          localStorage.setItem('manga_token',data.token);
          localStorage.setItem('manga_username',data.username);
          localStorage.setItem('manga_role',data.role);
          window.location.href='/';
        }else{
          err.textContent=data.error||'Usuario o contraseña incorrectos.';
          err.style.display='block';btn.disabled=false;btn.textContent='Entrar';
        }
      }catch{
        err.textContent='Error de conexión con el servidor.';
        err.style.display='block';btn.disabled=false;btn.textContent='Entrar';
      }
    }
  </script>
</body>
</html>
